<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Реєстрація</title>
    <link rel="stylesheet" href="/static/style.css" />
    <style>
        .auth-form {
            max-width: 400px;
            margin: 100px auto;
            background: #111720;
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid #1e2d3d;
        }
        .auth-form h2 {
            color: #f0f6ff;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .auth-form input {
            width: 100%;
            padding: 10px;
            margin-bottom: 1rem;
            border-radius: 6px;
            border: 1px solid #1e2d3d;
            background: #0a0e13;
            color: #f0f6ff;
            font-size: 15px;
        }
        .auth-form button {
            width: 100%;
            padding: 10px;
            background: #00e5ff;
            color: #000;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }
        .auth-form button:hover { background: #00b8d4; }
        .auth-link {
            text-align: center;
            margin-top: 1rem;
            font-size: 14px;
            color: #4a5f78;
        }
        .auth-link a { color: #00e5ff; }
        .error {
            color: #ff4444;
            font-size: 14px;
            margin-bottom: 1rem;
            text-align: center;
        }
        .success {
            color: #39d353;
            font-size: 14px;
            margin-bottom: 1rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="auth-form">
        <h2>📝 Реєстрація</h2>
        <div class="error" id="error"></div>
        <div class="success" id="success"></div>
        <input type="text" id="username" placeholder="Логін" />
        <input type="password" id="password" placeholder="Пароль" />
        <input type="password" id="password2" placeholder="Повторіть пароль" />
        <button id="register-btn">Зареєструватись</button>
        <div class="auth-link">
            Вже є акаунт? <a href="/login">Увійти</a>
        </div>
    </div>

    <script>
        document.querySelector('#register-btn').addEventListener('click', function() {
            const username = document.querySelector('#username').value;
            const password = document.querySelector('#password').value;
            const password2 = document.querySelector('#password2').value;

            // Перевіряємо що паролі співпадають
            if (password !== password2) {
                document.querySelector('#error').textContent = 'Паролі не співпадають!';
                return;
            }

            if (username === '' || password === '') {
                document.querySelector('#error').textContent = 'Заповни всі поля!';
                return;
            }

            fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            })
            .then(response => response.json())
            .then(data => {
                if (data.ok) {
                    document.querySelector('#success').textContent = 'Акаунт створено! Переходимо...';
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 1500);
                } else {
                    document.querySelector('#error').textContent = data.error;
                }
            });
        });
    </script>
</body>
</html>
